name: Password rotation trial for cstest

on:
  workflow_dispatch:
    inputs:
      username:
        description: '対象ユーザーのログインID'
        required: false
        default: 'cstest'
      recipient_email:
        description: '通知先メールアドレス'
        required: false
        default: 'kuwaharata@systena.co.jp'
      dry_run:
        description: '更新せずに内容だけ確認する'
        required: false
        type: boolean
        default: false

jobs:
  rotate_password:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: knowledge_base
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rotate password
        working-directory: knowledge_base
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          DB_ENGINE: ${{ secrets.DB_ENGINE }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          EMAIL_BACKEND: ${{ secrets.EMAIL_BACKEND }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
          EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
        run: |
          USERNAME="${{ github.event.inputs.username }}"
          if [ -z "$USERNAME" ]; then USERNAME="cstest"; fi

          RECIPIENT_EMAIL="${{ github.event.inputs.recipient_email }}"
          if [ -z "$RECIPIENT_EMAIL" ]; then RECIPIENT_EMAIL="kuwaharata@systena.co.jp"; fi

          DRY_RUN="${{ github.event.inputs.dry_run }}"

          ARGS=(--username "$USERNAME" --recipient-email "$RECIPIENT_EMAIL")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          python manage.py rotate_user_password "${ARGS[@]}"